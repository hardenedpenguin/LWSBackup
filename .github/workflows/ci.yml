name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck scripts
        run: |
          shellcheck -x -s bash scripts/lws-backup
          find scripts/lib scripts/ui scripts/commands scripts/templates \
            -name '*.sh' -print0 | xargs -0 -r shellcheck -x -s bash

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run bats tests
        run: bats tests/
